server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: memory-module
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  datasource:
    url: ${MEMORY_DB_URL:jdbc:postgresql://localhost:55432/memory_module}
    username: ${MEMORY_DB_USERNAME:memory}
    password: ${MEMORY_DB_PASSWORD:memory}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${MEMORY_REDIS_HOST:localhost}
      port: ${MEMORY_REDIS_PORT:6379}
      database: 0
  flyway:
    enabled: ${MEMORY_FLYWAY_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.openclaw.memory: INFO
    com.openclaw.memory.agents: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/memory-module.log

memory:
  # Runtime Retrieval Configuration
  working-ttl: ${MEMORY_WORKING_TTL:PT24H}
  retrieval-limit: ${MEMORY_RETRIEVAL_LIMIT:12}

  # QMD sidecar (Node.js, @tobilu/qmd)
  # Start with: cd qmd-server && npm install && node server.js
  qmd:
    enabled: ${QMD_ENABLED:false}
    base-url: ${QMD_BASE_URL:http://localhost:9090}
    connect-timeout: PT3S
    request-timeout: PT10S
    rerank: ${QMD_RERANK:false}
    min-score: ${QMD_MIN_SCORE:0.0}

  http:
    connect-timeout: ${MEMORY_HTTP_CONNECT_TIMEOUT:PT3S}
    read-timeout: ${MEMORY_HTTP_READ_TIMEOUT:PT20S}

  vector:
    collection: ${MEMORY_QDRANT_COLLECTION:agent_memory}
    dimensions: ${MEMORY_VECTOR_DIMENSIONS:768}
    qdrant-url: ${MEMORY_QDRANT_URL:http://localhost:6333}

  embedding:
    base-url: ${MEMORY_EMBEDDING_BASE_URL:http://localhost:1234/v1}
    model: ${MEMORY_EMBEDDING_MODEL:text-embedding-granite-embedding-278m-multilingual}
    api-key: ${MEMORY_EMBEDDING_API_KEY:local}

  module:
    # Event Store Configuration
    event-store:
      type: ${EVENT_STORE_TYPE:in-memory}  # in-memory | duckdb | postgresql
      max-events: ${EVENT_STORE_MAX:1000000}
      export-parquet: ${EVENT_STORE_PARQUET:false}
      cleanup-interval-hours: 24

    # Blackboard Configuration
    blackboard:
      max-tasks: ${BLACKBOARD_MAX_TASKS:10000}
      max-artifacts: ${BLACKBOARD_MAX_ARTIFACTS:100000}
      cleanup-interval-hours: 24

    # Agents Configuration
    agents:
      orchestrator:
        max-decomposition-depth: 5
        timeout-seconds: 300
      retrieval:
        # qmd        → Java QMDRetrievalEngine (no external deps)
        # qmd-http   → @tobilu/qmd via Node.js sidecar (requires memory.qmd.enabled=true)
        # legacy     → BlackboardRetriever (substring fallback)
        provider: ${RETRIEVAL_PROVIDER:qmd}
        cache-enabled: ${RETRIEVAL_CACHE_ENABLED:true}
        cache-ttl-minutes: ${RETRIEVAL_CACHE_TTL_MINUTES:60}
        bm25-enabled: true
        vector-enabled: true
        rerank-enabled: true
      graph:
        max-nodes: 100000
        max-edges: 500000

  maintenance:
    episodic-retention: ${MEMORY_EPISODIC_RETENTION:P30D}
    cleanup-cron: ${MEMORY_CLEANUP_CRON:0 0 3 * * *}

  # Graph backend: in-memory (default) | kuzu
  # kuzu requires: memory.graph.kuzu.path (default ./data/kuzu_graph)
  graph:
    backend: ${GRAPH_BACKEND:kuzu}
    kuzu:
      path: ${KUZU_DB_PATH:./data/kuzu_graph}

    # Performance Configuration
    performance:
      thread-pool-size: ${THREAD_POOL_SIZE:16}
      queue-capacity: 1000
      metric-collection-enabled: true

    # Security Configuration
    security:
      provenance-required: true
      append-only-enforced: true
      conflict-tracking-enabled: true
