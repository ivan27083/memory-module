services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: memory_module
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
